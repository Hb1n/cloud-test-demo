<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>云测试服务</title>
  <link rel="stylesheet" href="../Games-design-skill/assets/layout-shell.css" />
  <link rel="stylesheet" href="https://unpkg.com/@douyinfe/semi-ui@2.70.0/dist/css/semi.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/@douyinfe/semi-icons@2.70.0/dist/css/semi-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif; color: #1c1f23; }
    .main { max-width: 1072px; margin: 0 auto; padding: 0 0 48px; }
    .page-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .page-title { font-size:24px; line-height:32px; font-weight:600; }
    .func-desc { display:inline-flex; align-items:center; gap:6px; font-size:14px; color:rgba(28,31,35,.6); text-decoration:none; }
    .func-desc-icon { display:inline-flex; align-items:center; color:inherit; }
    .page-banner-wrap { margin-bottom:16px; }
    .page-banner-wrap .semi-banner { border-radius:12px; }
    .page-banner-wrap .semi-banner-info.semi-banner-bordered { border:1px solid var(--semi-color-primary-disabled); }
    .tabs-line { display:flex; border-bottom:1px solid rgba(28,31,35,.08); margin-bottom:16px; }
    .line-tab { padding:16px 0 14px; margin-right:24px; border:none; background:none; font-size:14px; color: rgba(28,31,35,.6); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; }
    .line-tab.active { color:#1c1f23; font-weight:600; border-bottom-color:#1c5cfb; }
    .subtabs { display:flex; gap:8px; margin-bottom:16px; }
    .subtab { padding:8px 12px; border:none; border-radius:3px; background:transparent; color: rgba(28,31,35,.6); cursor:pointer; }
    .subtab.active { background:#edf3ff; color:#1c5cfb; font-weight:600; }
    .card { background:#fff; border-radius:12px; padding:24px; margin-bottom:16px; }
    .card-toolbar { display:flex; align-items:flex-start; justify-content:space-between; gap:24px; margin-bottom:24px; }
    .filters { display:flex; flex:1; min-width:0; flex-wrap:wrap; gap:16px 24px; align-items:center; }
    .filters--multi-row { flex-direction:column; flex-wrap:nowrap; align-items:flex-start; gap:16px; }
    .filters--multi-row .filters-row { display:flex; flex-wrap:wrap; gap:16px 24px; align-items:center; }
    .card-toolbar-action { flex-shrink:0; }
    .field { display:flex; align-items:center; gap:8px; }
    .field label { font-size:14px; white-space:nowrap; color:#1c1f23; }
    .field-control { flex-shrink:0; }
    .field-control--input,
    .field-control--select { width:216px; }
    .field-control--date { width:260px; }
    .btn-primary { height:32px; padding:0 12px; border:none; border-radius:3px; background:#1c5cfb; color:#fff; font-weight:600; cursor:pointer; }
    .table-wrap { overflow:auto; position:relative; }
    .col-sticky-right {
      position: sticky;
      right: 0;
      z-index: 1;
      background-color: #fff;
    }
    .table-wrap.has-horizontal-scroll:not(.scroll-at-right) .col-sticky-right::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 4px;
      transform: translateX(-100%);
      background: rgba(var(--semi-grey-2), 0.3);
      pointer-events: none;
    }
    thead .col-sticky-right {
      z-index: 2;
      background-color: #f7f8f9;
    }
    tbody .col-sticky-right::before { bottom: -1px; }
    tbody .col-sticky-right { background-color: #fff; }
    .table-pagination { display:flex; justify-content:flex-end; margin-top:16px; }
    table { width:100%; min-width:1400px; border-collapse:collapse; table-layout:fixed; }
    thead th { height:36px; padding:8px 12px; text-align:left; font-size:14px; color:rgba(28,31,35,.6); background:rgba(46,50,56,.05); }
    tbody td { height:56px; padding:0 12px; border-bottom:1px solid rgba(28,31,35,.08); font-size:14px; vertical-align:middle; }
    .score { font-weight:400; color:#1c1f23; }
    .status { display:inline-flex; align-items:center; gap:8px; }
    .status::before { content:""; width:8px; height:8px; border-radius:50%; background:#3bb346; }
    .status.queue::before { background:#a7abb0; }
    .status.testing::before { background:#f0b114; }
    .status.cancel::before { background:#888d92; }
    .status.error::before { background:#f93920; }
    .actions a { color:#1c5cfb; text-decoration:none; margin-right:16px; font-weight:600; }
    .actions a.muted { color:rgba(28,31,35,.6); }
    .actions .danger { color:#f93920; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .test-form-modal .semi-form-field { margin-bottom: 16px; }
    .test-form-modal .form-group-block { margin-bottom: 16px; }
    .test-form-modal .form-group-block > .semi-form-field {
      margin-bottom: 0 !important;
      padding-bottom: 0 !important;
    }
    .test-form-modal .form-group-block > .semi-form-field-horizontal {
      align-items: center;
    }
    .test-form-modal .form-group-block > .semi-form-field-horizontal .semi-form-field-label {
      align-self: center;
      padding-top: 0;
      line-height: 20px;
    }
    .test-form-modal .form-group-block > .semi-form-field-horizontal .semi-form-field-main {
      display: flex;
      align-items: center;
      min-height: 32px;
    }
    .test-form-modal .form-group-label {
      width: 145px;
      flex-shrink: 0;
      font-size: 14px;
      font-weight: 400;
      color: #1c1f23;
      line-height: 20px;
    }
    .test-form-modal .form-group-label-required::after {
      content: '*';
      color: #f93920;
      margin-left: 4px;
    }
    .test-form-modal .semi-form-field-label,
    .test-form-modal .semi-form-field-label-text {
      font-weight: 400 !important;
    }
    .test-form-modal .form-group-nested {
      margin-top: 8px;
      margin-left: 145px;
    }
    .test-form-modal .form-mode-hint {
      margin-top: 8px;
      margin-left: 145px;
      font-size: 12px;
      line-height: 16px;
      color: rgba(28, 31, 35, 0.6);
    }
    .test-form-modal .form-mode-hint .semi-typography-link {
      font-size: 12px;
      line-height: 16px;
    }
    .test-form-modal .mode-radio-with-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .test-form-modal .mode-beta-tag.semi-tag {
      margin: 0;
      border: none !important;
      background: linear-gradient(135deg, #7b61ff 0%, #1c5cfb 52%, #00c8ff 100%) !important;
      color: #fff !important;
      font-size: 12px;
      font-weight: 600;
      line-height: 16px;
      height: 20px;
      padding: 0 6px;
      border-radius: 3px;
    }
    .test-form-modal .form-group-nested > .semi-form-field {
      margin-bottom: 0 !important;
      padding-bottom: 0 !important;
    }
    .test-form-modal .form-inline-row {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }
    .test-form-modal .form-device-count {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
    }
    .test-form-modal .form-device-count .semi-form-field {
      margin: 0 !important;
      padding: 0 !important;
      flex: none;
      width: auto;
    }
    .test-form-modal .form-device-count .semi-form-field-main {
      margin: 0;
      padding: 0;
    }
    .test-form-modal .form-device-count .semi-input-number {
      width: 216px;
    }
    .test-form-modal .form-device-count-suffix {
      margin-left: 8px;
      font-size: 14px;
      line-height: 20px;
      color: #1c1f23;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .test-form-modal .form-readonly {
      font-size: 14px;
      color: #1c1f23;
      line-height: 20px;
    }
    .test-form-modal .form-standard-link {
      font-size: 14px;
      line-height: 20px;
      color: #1c5cfb;
      text-decoration: none;
    }
    .actions a.disabled { color: rgba(28,31,35,.35); cursor: not-allowed; pointer-events: none; }
    .compare-report-modal .semi-modal-title {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
    }
    .compare-report-modal .compare-modal-title-row {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
      width: 100%;
    }
    .compare-report-modal .compare-modal-title-text {
      font-size: 18px;
      font-weight: 600;
      color: #1c1f23;
      flex-shrink: 0;
      line-height: 24px;
    }
    .compare-report-modal .compare-modal-table-wrap {
      overflow: auto;
      position: relative;
    }
    .compare-report-modal .compare-modal-table-wrap table {
      width: 100%;
      min-width: 1280px;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .compare-report-modal .compare-modal-table-wrap thead th {
      height: 36px;
      padding: 8px 12px;
      text-align: left;
      font-size: 14px;
      color: rgba(28,31,35,.6);
      background: rgba(46,50,56,.05);
      white-space: nowrap;
    }
    .compare-report-modal .compare-modal-table-wrap tbody td {
      height: 56px;
      padding: 0 12px;
      border-bottom: 1px solid rgba(28,31,35,.08);
      font-size: 14px;
      vertical-align: middle;
    }
    .compare-report-modal .compare-modal-table-wrap .sortable-th {
      cursor: pointer;
      user-select: none;
    }
    .compare-report-modal .compare-modal-table-wrap .sortable-th:hover {
      color: #1c1f23;
    }
    .compare-report-modal .compare-modal-table-wrap .sort-indicator {
      margin-left: 4px;
      color: #1c5cfb;
      font-size: 12px;
    }
    .compare-report-modal .compare-source-hint {
      font-size: 14px;
      line-height: 22px;
      color: rgba(28,31,35,.6);
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .compare-report-modal .table-pagination {
      margin-top: 16px;
    }
    .mode-table-empty {
      padding: 48px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
    }
    .mode-form-upload-hint {
      margin-top: 4px;
      font-size: 12px;
      line-height: 16px;
      color: rgba(28, 31, 35, 0.6);
    }
    .mode-upload-field {
      display: flex;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .mode-upload-label {
      width: 100px;
      flex-shrink: 0;
      padding-right: 12px;
      line-height: 32px;
      text-align: right;
      color: var(--semi-color-text-0);
      font-size: 14px;
    }
    .mode-upload-label::before {
      content: '*';
      color: var(--semi-color-danger);
      margin-right: 4px;
    }
    .mode-upload-main {
      flex: 1;
      min-width: 0;
    }
  </style>
</head>

<script>
(function () {
  var menu = document.getElementById('navMenu');
  if (!menu) return;

  function clearActive() {
    menu.querySelectorAll('.nav-item.active').forEach(function (i) { i.classList.remove('active'); });
    menu.querySelectorAll('.nav-group.active').forEach(function (g) { g.classList.remove('active'); });
  }

  function syncArrow(groupEl) {
    var id = groupEl.dataset.group;
    var children = menu.querySelector('[data-children="' + id + '"]');
    var arrow = groupEl.querySelector('.nav-arrow');
    if (!children || !arrow) return;
    var isOpen = children.classList.contains('open');
    arrow.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
  }

  menu.querySelectorAll('.nav-group[data-group]').forEach(function (g) { syncArrow(g); });

  menu.addEventListener('click', function (e) {
    var group = e.target.closest('.nav-group[data-group]');
    var item = e.target.closest('.nav-item[data-item]');

    if (group) {
      var id = group.dataset.group;
      if (group.dataset.noChildren !== undefined) {
        clearActive();
        group.classList.add('active');
        return;
      }
      var children = menu.querySelector('[data-children="' + id + '"]');
      if (!children) return;
      children.classList.toggle('open');
      syncArrow(group);
      return;
    }

    if (item) {
      clearActive();
      item.classList.add('active');
    }
  });
})();
</script>

<script>
(function () {
  function updateTableScrollState(wrap) {
    var canScroll = wrap.scrollWidth > wrap.clientWidth + 1;
    var atRight = wrap.scrollLeft + wrap.clientWidth >= wrap.scrollWidth - 1;
    wrap.classList.toggle('has-horizontal-scroll', canScroll);
    wrap.classList.toggle('scroll-at-right', atRight);
  }

  function bindTableScroll(wrap) {
    if (wrap._scrollBound) return;
    wrap._scrollBound = true;
    function update() { updateTableScrollState(wrap); }
    wrap.addEventListener('scroll', update, { passive: true });
    window.addEventListener('resize', update);
    update();
  }

  window.updateTableScrollState = updateTableScrollState;
  window.bindTableScroll = bindTableScroll;

  document.querySelectorAll('.table-wrap').forEach(bindTableScroll);

  document.querySelectorAll('#mainTabs .line-tab, #subTabs .subtab').forEach(function (btn) {
    btn.addEventListener('click', function () {
      requestAnimationFrame(function () {
        document.querySelectorAll('.table-wrap').forEach(updateTableScrollState);
      });
    });
  });
})();
</script>

  var MODE_USERS = ['tester_amy', 'tester_bob', 'qa_lee', 'qa_john', 'dev_kai', 'ops_mia', 'tester_chen', 'dev_sam'];

  function generateMockAiCommands(count) {

      list.push({

  function generateMockScripts(count) {

      list.push({
        id: 'script-' + i,
        name: 'Test_script' + pad2(i),
        user: MODE_USERS[(i + 2) % MODE_USERS.length],
        time: '2025-07-' + pad2(8 + (i % 20)) + ' ' + pad2(9 + (i % 12)) + ':' + pad2((i * 3) % 60)
      });

  }

  function generateMockHistoryDevices(count) {
    var list = [];
    for (var i = 1; i <= count; i++) {
      list.push({
        id: 'hist-' + i,
        version: 'v1.1.' + (i % 10),
        count: 10 + (i % 30),
        time: '2025-07-' + pad2(1 + (i % 28)) + ' ' + pad2(8 + (i % 12)) + ':' + pad2((i * 5) % 60)
      });
    }
    return list;
  }

  function generateMockSelfDevices(count) {
    var list = [];
    for (var i = 1; i <= count; i++) {
      list.push({
        id: 'self-' + i,
        version: 'v2.0.' + (i % 8),
        count: 5 + (i % 25),
        time: '2025-06-' + pad2(1 + (i % 28)) + ' ' + pad2(10 + (i % 10)) + ':' + pad2((i * 7) % 60)
      });
    }
    return list;
  }

  var MOCK_HISTORY_DEVICES = generateMockHistoryDevices(12);
  var MOCK_SELF_DEVICES = generateMockSelfDevices(12);

  function createModeStore(initialData) {
    return {
      data: initialData,
      listeners: [],
      subscribe: function (fn) {
        this.listeners.push(fn);
        return function () {
          this.listeners = this.listeners.filter(function (item) { return item !== fn; });
        }.bind(this);
      },
      setData: function (updater) {
        this.data = typeof updater === 'function' ? updater(this.data.slice()) : updater;
        this.listeners.forEach(function (fn) { fn(); });
      }
    };
  }

  var aiModeStore = createModeStore(generateMockAiCommands(36));
  var scriptModeStore = createModeStore(generateMockScripts(36));

  function generateMockTests(count) {
    var list = [];
    for (var i = 1; i <= count; i++) {
      var mode = TEST_MODES[i % 2];
      var status = TEST_STATUSES[i % 5];
      var hasScore = status.key === 'testing' || status.key === 'done';
      var deviceMode = DEVICE_MODES[i % 3];
      var resourceId = mode.key === 'ai' ? 'ai-' + ((i % 36) + 1) : 'script-' + ((i % 36) + 1);
      list.push({
        id: 'TST2024' + String(6000 + i),
        version: 'v1.2.' + pad2(20 - (i % 15)),
        mode: mode,
        status: status,
        scores: hasScore ? [80 + (i % 15), 75 + (i % 18), 78 + (i % 12), 72 + (i % 20)] : null,
        submitter: TEST_SUBMITTERS[i % TEST_SUBMITTERS.length],
        time: '2026-06-' + pad2(17 - (i % 10)) + ' ' + pad2(9 + (i % 12)) + ':' + pad2(i % 60),
        remark: TEST_REMARKS[i % TEST_REMARKS.length],
        config: {
          modeKey: mode.key,
          resourceId: resourceId,
          deviceMode: deviceMode,
          deviceCount: 15 + (i % 25),
          historyDeviceId: deviceMode === 'history' ? 'hist-' + ((i % 12) + 1) : null,
          selfDeviceId: deviceMode === 'self' ? 'self-' + ((i % 12) + 1) : null
        }
      });
    }
    return list;
  }

  var testStore = {
    data: generateMockTests(48),
    listeners: [],
    subscribe: function (fn) {
      testStore.listeners.push(fn);
      return function () {
        testStore.listeners = testStore.listeners.filter(function (item) { return item !== fn; });
      };
    },
    setData: function (updater) {
      testStore.data = typeof updater === 'function' ? updater(testStore.data.slice()) : updater;
      testStore.listeners.forEach(function (fn) { fn(); });
    }
  };

  var modalStore = {
    form: { visible: false, mode: 'create', rowId: null },
    cancel: { visible: false, rowId: null },
    compare: { visible: false, sourceRowId: null },
    listeners: [],
    subscribe: function (fn) {
      modalStore.listeners.push(fn);
      return function () {
        modalStore.listeners = modalStore.listeners.filter(function (item) { return item !== fn; });
      };
    },
    notify: function () {
      modalStore.listeners.forEach(function (fn) { fn(); });
    },
    openForm: function (mode, rowId) {
      modalStore.form = { visible: true, mode: mode, rowId: rowId || null };
      modalStore.notify();
    },
    closeForm: function () {
      modalStore.form = { visible: false, mode: 'create', rowId: null };
      modalStore.notify();
    },
    openCancel: function (rowId) {
      modalStore.cancel = { visible: true, rowId: rowId };
      modalStore.notify();
    },
    closeCancel: function () {
      modalStore.cancel = { visible: false, rowId: null };
      modalStore.notify();
    },
    openCompare: function (rowId) {
      modalStore.compare = { visible: true, sourceRowId: rowId };
      modalStore.notify();
    },
    closeCompare: function () {
      modalStore.compare = { visible: false, sourceRowId: null };
      modalStore.notify();
    },
    modeCreate: { visible: false, kind: null },
    modeDelete: { visible: false, kind: null, rowId: null },
    openModeCreate: function (kind) {
      modalStore.modeCreate = { visible: true, kind: kind };
      modalStore.notify();
    },
    closeModeCreate: function () {
      modalStore.modeCreate = { visible: false, kind: null };
      modalStore.notify();
    },
    openModeDelete: function (kind, rowId) {
      modalStore.modeDelete = { visible: true, kind: kind, rowId: rowId };
      modalStore.notify();
    },
    closeModeDelete: function () {
      modalStore.modeDelete = { visible: false, kind: null, rowId: null };
      modalStore.notify();
    }
  };

  function useTestStore() {
    var tickState = useState(0);
    var tick = tickState[0];
    var setTick = tickState[1];
    useEffect(function () {
      return testStore.subscribe(function () { setTick(function (n) { return n + 1; }); });
    }, []);
    return [testStore.data, testStore.setData];
  }

  function useModalStore() {
    var tickState = useState(0);
    var setTick = tickState[1];
    useEffect(function () {
      return modalStore.subscribe(function () { setTick(function (n) { return n + 1; }); });
    }, []);
    return modalStore;
  }

  function useModeStore(store) {
    var tickState = useState(0);
    var setTick = tickState[1];
    useEffect(function () {
      return store.subscribe(function () { setTick(function (n) { return n + 1; }); });
    }, [store]);
    return [store.data, store.setData];
  }

  function getModeStoreByKind(kind) {
    return kind === 'script' ? scriptModeStore : aiModeStore;
  }

  function filterModeRows(rows, nameKeyword, dateRange) {
    var keyword = (nameKeyword || '').trim().toLowerCase();
    return rows.filter(function (row) {
      if (keyword && row.name.toLowerCase().indexOf(keyword) === -1) return false;
      if (dateRange && dateRange[0] && dateRange[1]) {
        var rowDate = row.time.slice(0, 10);
        var start = formatDateValue(dateRange[0]);
        var end = formatDateValue(dateRange[1]);
        if (rowDate < start || rowDate > end) return false;
      }
      return true;
    });
  }

  function formatDateValue(value) {
    if (!value) return '';
    if (typeof value === 'string') return value.slice(0, 10);
    if (value instanceof Date) {
      return value.getFullYear() + '-' + pad2(value.getMonth() + 1) + '-' + pad2(value.getDate());
    }
    return String(value).slice(0, 10);
  }

  function downloadMockZip(fileName) {
    var blob = new Blob(['mock zip content'], { type: 'application/zip' });
    var url = URL.createObjectURL(blob);
    var link = document.createElement('a');
    link.href = url;
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  function createModeRow(kind, existingRows, name) {
    var prefix = kind === 'script' ? 'script-' : 'ai-';
    var maxId = 0;
    existingRows.forEach(function (row) {
      var num = parseInt(String(row.id).replace(prefix, ''), 10);

      name: name,
      user: 'Sally07',

  function buildFormInit(row) {

        deviceMode: 'random',
        deviceCount: 20,
        historyDeviceId: '',

  function renderScoreCell(value) {
    return createElement('td', { className: 'score' }, value == null ? '--' : String(value));

  function renderTestRow(row, handlers) {
    var status = row.status;
    var statusClass = 'status' + (status.className ? ' ' + status.className : '');
    var statusProps = { className: statusClass };
    if (status.title) statusProps.title = status.title;

    var actionCell;
    if (status.key === 'testing') {
      actionCell = createElement('td', { className: 'actions col-sticky-right' }, '-');

      actionCell = createElement('td', { className: 'actions col-sticky-right' },
        createElement('a', {
          href: '云测试服务-测试报告.html?testId=' + encodeURIComponent(row.id),
          onClick: function (e) { e.stopPropagation(); }
        }, '报告'),
        createElement('a', {
          href: 'javascript:void(0)',
          onClick: function (e) {
            e.preventDefault();
            handlers.onCompare(row.id);
          }
        }, '对比')
      );
    } else if (status.key === 'cancel') {
      actionCell = createElement('td', { className: 'actions col-sticky-right' },
        createElement('a', {
          className: 'muted',
          href: 'javascript:void(0)',
          onClick: function (e) {
            e.preventDefault();
            handlers.onRetest(row.id);
          }

        )
      )
    );
  }

  function ModeDeleteConfirmModal() {
    var modal = useModalStore();
    var kind = modal.modeDelete.kind;
    var rowId = modal.modeDelete.rowId;

    if (!kind) return null;

    var store = getModeStoreByKind(kind);
    var isAi = kind === 'ai';

    function handleDelete() {
      store.setData(function (prev) {
        return prev.filter(function (row) { return row.id !== rowId; });
      });
      Toast.success({ content: isAi ? '指令已删除' : '脚本已删除' });
      modalStore.closeModeDelete();
    }

    return createElement(Modal, {
      title: isAi ? '确认删除操作指令' : '确认删除操作脚本',
      visible: modal.modeDelete.visible,
      size: 'small',
      width: 448,
      centered: true,
      onCancel: modalStore.closeModeDelete,
      footer: createElement(React.Fragment, null,
        createElement(Button, { onClick: modalStore.closeModeDelete }, '取消'),
        createElement(Button, { theme: 'solid', type: 'danger', onClick: handleDelete }, '删除')
      )
    },
      isAi ? '删除后操作指令不再生效' : '删除后脚本不再生效'
    );
  }

  function ModeTabPanel(props) {
    var kind = props.kind;
    var isAi = kind === 'ai';
    var store = getModeStoreByKind(kind);
    var rowsState = useModeStore(store);
    var rows = rowsState[0];
    var nameFilterState = useState('');
    var nameFilter = nameFilterState[0];
    var setNameFilter = nameFilterState[1];
    var dateFilterState = useState(null);
    var dateFilter = dateFilterState[0];
    var setDateFilter = dateFilterState[1];
    var pageState = useState(1);
    var page = pageState[0];
    var setPage = pageState[1];
    var pageSizeState = useState(10);
    var pageSize = pageSizeState[0];
    var setPageSize = pageSizeState[1];
    var wrapRef = useRef(null);

    var nameLabel = isAi ? '指令名称' : '脚本名称';
    var namePlaceholder = isAi ? '请输入指定名称' : '请输入脚本名称';
    var createLabel = isAi ? '新建指令' : '新建脚本';

    var filteredRows = useMemo(function () {
      return filterModeRows(rows, nameFilter, dateFilter);
    }, [rows, nameFilter, dateFilter]);

    useEffect(function () {
      setPage(1);
    }, [nameFilter, dateFilter]);

    useEffect(function () {
      var maxPage = Math.max(1, Math.ceil(filteredRows.length / pageSize) || 1);
      if (page > maxPage) setPage(maxPage);
    }, [filteredRows.length, pageSize, page]);

    var start = (page - 1) * pageSize;
    var pageRows = filteredRows.slice(start, start + pageSize);

    useEffect(function () {
      var wrap = wrapRef.current;
      if (!wrap || !window.bindTableScroll) return;
      window.bindTableScroll(wrap);
      window.updateTableScrollState(wrap);
    }, [page, pageSize, filteredRows.length]);

    function renderModeRow(row) {
      return createElement('tr', { key: row.id },
        createElement('td', null, row.name),
        createElement('td', null, row.user),
        createElement('td', null, row.time),
        createElement('td', { className: 'actions' },
          createElement('a', {
            href: 'javascript:void(0)',
            onClick: function (e) {
              e.preventDefault();
              downloadMockZip(row.name + '.zip');
            }
          }, '下载'),
          createElement('a', {
            className: 'danger',
            href: 'javascript:void(0)',
            onClick: function (e) {
              e.preventDefault();
              modalStore.openModeDelete(kind, row.id);
            }
          }, '删除')
        )
      );
    }

    return createElement(React.Fragment, null,
      createElement('div', { className: 'card-toolbar' },
        createElement('div', { className: 'filters' },
          createElement('div', { className: 'field' },
            createElement('label', null, nameLabel),
            createElement('div', { className: 'field-control field-control--input' },
              createElement(Input, {
                prefix: createElement(IconSearch),
                placeholder: namePlaceholder,
                showClear: true,
                value: nameFilter,
                onChange: function (value) { setNameFilter(value); },
                style: { width: '100%' }
              })
            )
          ),
          createElement('div', { className: 'field' },
            createElement('label', null, '上传时间'),
            createElement('div', { className: 'field-control field-control--date' },
              createElement(DatePicker, {
                type: 'dateRange',
                style: { width: '100%' },
                placeholder: ['开始日期', '结束日期'],
                rangeSeparator: '~',
                value: dateFilter,
                onChange: function (value) { setDateFilter(value); }
              })
            )
          )
        ),
        createElement(Button, {
          theme: 'solid',
          type: 'primary',
          className: 'card-toolbar-action',
          onClick: function () { modalStore.openModeCreate(kind); }
        }, createLabel)
      ),
      filteredRows.length === 0
        ? createElement('div', { className: 'mode-table-empty' },
            createElement(Empty, {
              description: (nameFilter || (dateFilter && dateFilter[0]))
                ? '没有符合条件的记录'
                : '暂无数据'
            })
          )
        : createElement(React.Fragment, null,
            createElement('div', { className: 'table-wrap', ref: wrapRef },
              createElement('table', { style: { minWidth: '760px' } },
                createElement('thead', null,
                  createElement('tr', null,
                    createElement('th', null, nameLabel),
                    createElement('th', null, '上传用户'),
                    createElement('th', null, '上传时间'),
                    createElement('th', null, '操作')
                  )
                ),
                createElement('tbody', null, pageRows.map(renderModeRow))
              )
            ),
            createElement('div', { className: 'table-pagination' },
              createElement(Pagination, {
                total: filteredRows.length,
                currentPage: page,
                pageSize: pageSize,
                showTotal: true,
                showSizeChanger: true,
                onChange: function (nextPage, nextPageSize) {
                  setPage(nextPage);
                  setPageSize(nextPageSize);
                }
              })
            )
          )
    );
  }

  mountSearchInput(document.getElementById('filter-test-id'), '请输入测试ID');
  mountSearchInput(document.getElementById('filter-test-version'), '请输入测试版本');
  mountSearchInput(document.getElementById('filter-submitter'), '请输入提交人');
  mountDateRange(document.getElementById('filter-test-time'));
  mountSelect(document.getElementById('filter-test-mode'), [
    { value: 'all', label: '全部' },
    { value: 'ai', label: 'AI 自动玩' },
    { value: 'script', label: '脚本定制' }
  ]);
  mountSelect(document.getElementById('filter-test-status'), [
    { value: 'all', label: '全部' },
    { value: 'queue', label: '排队中' },
    { value: 'testing', label: '测试中' },
    { value: 'done', label: '已完成' },
    { value: 'cancel', label: '已取消' },
    { value: 'error', label: '服务异常' }
  ]);

  var testTableMount = document.getElementById('test-table-mount');
  if (testTableMount) {
    createRoot(testTableMount).render(createElement(TestTablePanel));
  }

  var newTestBtnMount = document.getElementById('new-test-btn-mount');
  if (newTestBtnMount) {
    createRoot(newTestBtnMount).render(createElement(NewTestButton));
  }

  var modalsMount = document.getElementById('modals-mount');
  if (modalsMount) {
    createRoot(modalsMount).render(createElement(ModalsRoot));
  }

  var aiModeMount = document.getElementById('ai-mode-mount');
  if (aiModeMount) {
    createRoot(aiModeMount).render(createElement(ModeTabPanel, { kind: 'ai' }));
  }

  var scriptModeMount = document.getElementById('script-mode-mount');
  if (scriptModeMount) {
    createRoot(scriptModeMount).render(createElement(ModeTabPanel, { kind: 'script' }));
  }

  var bannerEl = document.getElementById('page-banner');
  if (bannerEl) {
    createRoot(bannerEl).render(createElement(Banner, {
      fullMode: false,
      type: 'info',
      bordered: true,
      closeIcon: null,
      description: '平台新增在线云测试服务，可对小游戏在主流机型中的性能表现开展批量化跑测，助力小游戏迅速定位性能问题并提供相应解决方案。'
    }));
  }

  var funcDescIconEl = document.getElementById('func-desc-icon');
  if (funcDescIconEl) {
    createRoot(funcDescIconEl).render(createElement(IconBookStroked, {
      size: 'default',
      'aria-hidden': true
    }));
  }
})();
</script>
</body>
</html>
