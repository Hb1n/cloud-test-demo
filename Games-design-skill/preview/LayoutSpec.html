<script>
(function () {
  var menu = document.getElementById('navMenu');
  if (!menu) return;

  function clearActive() {
    menu.querySelectorAll('.nav-item.active').forEach(function (i) { i.classList.remove('active'); });
    menu.querySelectorAll('.nav-group.active').forEach(function (g) { g.classList.remove('active'); });
  }

  function syncArrow(groupEl) {
    var id = groupEl.dataset.group;
    var children = menu.querySelector('[data-children="' + id + '"]');
    var arrow = groupEl.querySelector('.nav-arrow');
    if (!children || !arrow) return;
    var isOpen = children.classList.contains('open');
    arrow.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
  }

  menu.querySelectorAll('.nav-group[data-group]').forEach(function (g) { syncArrow(g); });

  menu.addEventListener('click', function (e) {
    var group = e.target.closest('.nav-group[data-group]');
    var item = e.target.closest('.nav-item[data-item]');

    if (group) {
      var id = group.dataset.group;
      if (group.dataset.noChildren !== undefined) {
        clearActive();
        group.classList.add('active');
        return;
      }
      var children = menu.querySelector('[data-children="' + id + '"]');
      if (!children) return;
      children.classList.toggle('open');
      syncArrow(group);
      return;
    }

    if (item) {
      clearActive();
      item.classList.add('active');
    }
  });
})();
</script>
